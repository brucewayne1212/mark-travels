<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark's Travels</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #333;
            --text: #e0e0e0;
            --text-muted: #888;
            --accent: #4a9eff;
            --accent-dim: #2a5e8f;
            --green: #4caf50;
            --orange: #ff9800;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }
        header { text-align: center; padding: 48px 0 32px; }
        header h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        header .emoji { font-size: 2.8rem; margin-bottom: 12px; }
        header p { color: var(--text-muted); font-size: 1.05rem; }
        .trips { display: grid; gap: 20px; margin-top: 16px; }
        .trip-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: border-color 0.2s, transform 0.15s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .trip-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .trip-header { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
        .trip-icon { font-size: 2.4rem; flex-shrink: 0; }
        .trip-info { flex: 1; }
        .trip-info h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 2px; }
        .trip-dates { color: var(--text-muted); font-size: 0.95rem; }
        .trip-countdown {
            margin-top: 6px;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .trip-countdown.in { color: var(--green); }
        .trip-countdown.soon { color: var(--orange); }
        .trip-countdown.waiting { color: var(--accent); }
        .trip-countdown.past { color: var(--text-muted); }
        .trip-duration {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .trip-status {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .trip-status.upcoming { background: rgba(74,158,255,0.15); color: var(--accent); }
        .trip-status.active { background: rgba(76,175,80,0.15); color: var(--green); }
        .trip-status.past { background: rgba(255,255,255,0.06); color: var(--text-muted); }
        .trip-meta {
            display: flex; flex-wrap: wrap; gap: 16px;
            margin-top: 12px; padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .trip-meta-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.9rem; color: var(--text-muted);
        }
        .trip-meta-item .icon { font-size: 1.1rem; }
        .trip-accommodation {
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .trip-accommodation strong { color: var(--text); font-weight: 600; }
        .map-link {
            display: inline-flex; align-items: center; gap: 8px;
            margin-top: 16px; padding: 10px 20px;
            background: var(--accent); color: #fff; border-radius: 8px;
            font-weight: 600; font-size: 0.95rem;
            text-decoration: none; transition: background 0.2s;
        }
        .map-link:hover { background: var(--accent-dim); }
        .map-link.disabled { pointer-events: none; opacity: 0.4; }
        footer { text-align: center; padding: 48px 0 32px; color: var(--text-muted); font-size: 0.85rem; }
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .trip-header { flex-direction: column; text-align: center; align-items: flex-start; }
            .trip-meta { justify-content: center; }
            .trip-status { align-self: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="emoji">✈️</div>
            <h1>Mark's Travels</h1>
            <p>Upcoming trips, itineraries &amp; interactive maps</p>
        </header>
        <div class="trips" id="trips"></div>
        <footer>Auto-updated from Apple Calendar · Powered by Travis</footer>
    </div>

    <script>
    const TRIPS = [
        {
            destination: "Barcelona",
            flag: "🇪🇸",
            start: "2026-07-13",
            end: "2026-07-17",
            hasMap: false,
            page: "trips/barcelona-2026.html",
            accommodation: null,
            accommodationNote: "School trip — group accommodation",
            meta: [{ icon: "🎒", label: "School trip" }]
        },
        {
            destination: "Jupiter, Florida",
            flag: "🇺🇸",
            start: "2026-07-23",
            end: "2026-08-01",
            hasMap: false,
            page: "trips/florida-2026.html",
            accommodation: {
                name: "Hampton Circle (friends' house)",
                address: "Hampton Cir, Jupiter, FL 33458",
                lat: 26.9138697,
                lng: -80.1161777
            },
            meta: [
                { icon: "✈️", label: "LHR → JFK → MIA / PBI → ATL → LHR" },
                { icon: "👨‍👩‍👧‍👧", label: "4 adults, 4 kids" }
            ]
        },
        {
            destination: "Corfu",
            flag: "🇬🇷",
            start: "2026-08-03",
            end: "2026-08-12",
            hasMap: false,
            page: "trips/corfu-2026.html",
            accommodation: {
                name: "Three Stars Beach Hotel",
                address: "Moraitika 490 84, Greece",
                lat: 39.4822387,
                lng: 19.9311771
            },
            meta: [
                { icon: "✈️", label: "BA0646 / BA0645" },
                { icon: "👨‍👩‍👧‍👧", label: "Family holiday" }
            ]
        },
        {
            destination: "Cambridge",
            flag: "🇬🇧",
            start: "2026-07-06",
            end: "2026-07-06",
            hasMap: true,
            page: "trips/cambridge-2026.html",
            accommodation: null,
            accommodationNote: null,
            meta: []
        },
        {
            destination: "Rome",
            flag: "🇮🇹",
            start: "2026-05-24",
            end: "2026-05-29",
            hasMap: true,
            page: "trips/rome-2026.html",
            accommodation: {
                name: "Casa Nanna Chic in Vatican",
                address: "Via Andrea Doria 16, 00192 Roma",
                lat: 41.9104386,
                lng: 12.4538441
            },
            meta: []
        }
    ];

    function daysBetween(a, b) {
        const ms = b.getTime() - a.getTime();
        return Math.round(ms / (1000 * 60 * 60 * 24));
    }

    function formatDate(d) {
        const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    function renderCountdown(trip) {
        const now = new Date();
        now.setHours(0,0,0,0);
        const start = new Date(trip.start + "T00:00:00");
        const end = new Date(trip.end + "T00:00:00");
        const daysUntil = daysBetween(now, start);
        const daysTotal = daysBetween(start, end) + 1;

        let html, cssClass;
        if (daysUntil < 0 && daysBetween(now, end) < 0) {
            html = `Completed — ${Math.abs(daysUntil + daysTotal - 1)} day${daysTotal > 1 ? 's' : ''} ago`;
            cssClass = "past";
        } else if (daysUntil <= 0 && daysBetween(now, end) >= 0) {
            const dayOf = daysBetween(start, now) + 1;
            html = `📍 Day ${dayOf} of ${daysTotal} — happening now!`;
            cssClass = "in";
        } else if (daysUntil <= 3) {
            html = `${daysUntil} day${daysUntil !== 1 ? 's' : ''} away — coming up!`;
            cssClass = "soon";
        } else {
            html = `${daysUntil} days away`;
            cssClass = "waiting";
        }
        return { html, cssClass };
    }

    function renderTrips() {
        const container = document.getElementById("trips");

        const sorted = [...TRIPS].sort((a, b) => {
            const now = new Date(); now.setHours(0,0,0,0);
            const aStart = new Date(a.start + "T00:00:00");
            const bStart = new Date(b.start + "T00:00:00");
            const aActive = now >= aStart && now <= new Date(a.end + "T00:00:00");
            const bActive = now >= bStart && now <= new Date(b.end + "T00:00:00");
            if (aActive && !bActive) return -1;
            if (!aActive && bActive) return 1;
            const aPast = now > new Date(a.end + "T00:00:00");
            const bPast = now > new Date(b.end + "T00:00:00");
            if (aPast && !bPast) return 1;
            if (!aPast && bPast) return -1;
            return aStart - bStart;
        });

        container.innerHTML = sorted.map(trip => {
            const start = new Date(trip.start + "T00:00:00");
            const end = new Date(trip.end + "T00:00:00");
            const now = new Date(); now.setHours(0,0,0,0);
            const isActive = now >= start && now <= end;
            const isPast = now > end;
            const daysTotal = daysBetween(start, end) + 1;

            let status, statusClass;
            if (isActive) { status = "Active"; statusClass = "active"; }
            else if (isPast) { status = "Completed"; statusClass = "past"; }
            else { status = "Upcoming"; statusClass = "upcoming"; }

            const countdown = renderCountdown(trip);

            const dateStr = daysTotal > 1
                ? `${formatDate(start)} – ${formatDate(end)}`
                : formatDate(start);

            // Duration string
            const nights = daysTotal - 1;
            let durationStr;
            if (daysTotal > 1) {
                durationStr = nights === 1 ? `${nights} night` : `${nights} nights`;
            } else {
                durationStr = "Day trip";
            }

            // Accommodation
            let accomHtml = '';
            if (trip.accommodation) {
                accomHtml = `<div class="trip-accommodation">🏨 <strong>${trip.accommodation.name}</strong><br>${trip.accommodation.address}</div>`;
            } else if (trip.accommodationNote) {
                accomHtml = `<div class="trip-accommodation">🏨 ${trip.accommodationNote}</div>`;
            }

            const metaHtml = trip.meta.length > 0
                ? `<div class="trip-meta">${trip.meta.map(m =>
                    `<div class="trip-meta-item"><span class="icon">${m.icon}</span> ${m.label}</div>`
                  ).join('')}</div>`
                : '';

            const mapHtml = trip.hasMap
                ? `<div class="map-link">🗺️ View Map</div>`
                : `<div class="map-link disabled">🗺️ Map coming soon</div>`;

            return `
                <a href="${trip.page}" class="trip-card">
                    <div class="trip-header">
                        <div class="trip-icon">${trip.flag}</div>
                        <div class="trip-info">
                            <h2>${trip.destination}</h2>
                            <div class="trip-dates">${dateStr}</div>
                            <div class="trip-countdown ${countdown.cssClass}">${countdown.html}</div>
                            <div class="trip-duration">📅 ${durationStr}</div>
                        </div>
                        <span class="trip-status ${statusClass}">${status}</span>
                    </div>
                    ${accomHtml}
                    ${metaHtml}
                    ${mapHtml}
                </a>
            `;
        }).join('');
    }

    renderTrips();
    </script>
</body>
</html>
